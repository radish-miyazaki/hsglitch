name: Release
on:
  push:
    tags: ["v*"]
permissions:
  contents: write
jobs:
  binaries:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            asset: hsglitch-linux-x86_64
          - os: macos-latest
            asset: hsglitch-macos-arm64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: haskell-actions/setup@v2
        with:
          ghc-version: "9.6"
          cabal-version: "latest"
      - run: cabal update
      - run: cabal build exe:hsglitch
      - name: Stage binary
        run: |
          mkdir -p dist
          bin=$(cabal list-bin exe:hsglitch)
          cp "$bin" "dist/${{ matrix.asset }}"
      - uses: softprops/action-gh-release@v2
        with:
          files: dist/${{ matrix.asset }}
